# ═══════════════════════════════════════════════════════════════#                    TrendRadar 配置文件#                      Version: 2.2.0# ═══════════════════════════════════════════════════════════════# 可视化配置编辑器地址: https://sansan0.github.io/TrendRadar/# ===============================================================# 1. 基础设置# ===============================================================app:  # 时区配置（影响所有时间显示、调度系统判断、数据存储）  # 常用时区：  #   - Asia/Shanghai (北京时间 UTC+8)  #   - America/New_York (美东时间 UTC-5/-4)  #   - Europe/London (伦敦时间 UTC+0/+1)  # 完整时区列表: https://en.wikipedia.org/wiki/List_of_tz_database_time_zones  timezone: "Asia/Shanghai"  show_version_update: true           # 显示版本更新提示# ===============================================================# 1.5 调度系统 —— 什么时间做什么事## 通过 timeline.yaml 里定义的时间段来自动决定：#   - 什么时候推送通知#   - 什么时候做 AI 分析#   - 用什么报告模式## 快速上手：选一个预设模板，改 preset 的值就行##   always_on       → 全天候，有新增即推送#   morning_evening → 全天推送 + 晚间当日汇总（推荐）#   office_hours    → 工作日三段式（到岗→午间→收工），周末增量自由推
