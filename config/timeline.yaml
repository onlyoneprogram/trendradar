custom:
  default:
    collect: true
    analyze: false
    push: false

  periods:
    morning_briefing:
      start: "07:30"
      end: "09:00"
      analyze: true
      ai_mode: "current"
      push: true
      report_mode: "current"
      once:
        analyze: true
        push: true
    daytime_push:
      start: "09:00"
      end: "18:00"
      analyze: false
      push: true
      report_mode: "current"
    evening_summary:
      start: "18:00"
      end: "23:00"
      analyze: true
      ai_mode: "daily"
      push: true
      report_mode: "daily"
      once:
        analyze: true
        push: true

  day_plans:
    all_day:
      periods:
        - morning_briefing
        - daytime_push
        - evening_summary

  week_map:
    1: "all_day"
    2: "all_day"
    3: "all_day"
    4: "all_day"
    5: "all_day"
    6: "all_day"
    7: "all_day"

  overlap:
    policy: "error_on_overlap"
