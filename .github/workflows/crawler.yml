     3|on:
     4|  schedule:
     5|    # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     6|    # ⚠️ 试用版说明 / Trial Mode
     7|    # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     8|    #
     9|    # 🔄 运行机制 / How it works:
    10|    #    - 每个周期为 7 天，届时自动停止
    11|    #    - 运行 "Check In" 会重置周期（重新开始 7 天倒计时，而非累加）
    12|    #    - Each cycle is 7 days, then auto-stops
    13|    #    - "Check In" resets the cycle (restarts 7-day countdown, not cumulative)
    14|    #
    15|    # 💡 设计初衷 / Why this design:
    16|    #    如果 7 天都忘了签到，或许这些资讯对你来说并非刚需
    17|    #    适时的暂停，能帮你从信息流中抽离，给大脑留出喘息的空间
    18|    #    If you forget for 7 days, maybe you don't really need it
    19|    #    A timely pause helps you detach from the stream and gives your mind space
    20|    #
    21|    # 🙏 珍惜资源 / Respect shared resources:
    22|    #    GitHub Actions 是平台提供的公共资源，每次运行都会消耗算力
    23|    #    签到机制确保资源分配给真正需要的用户，感谢你的理解与配合
    24|    #    GitHub Actions is a shared public resource provided by the platform
    25|    #    Check-in ensures resources go to those who truly need it — thank you
    26|    #
    27|    # 🚀 长期使用请部署 Docker 版本 / For long-term use, deploy Docker version
    28|    #
    29|    # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    30|    #
    31|    # 📝 修改运行时间：只改第一个数字（0-59），表示每小时第几分钟运行
    32|    # 📝 Change time: Only modify the first number (0-59) = minute of each hour
    33|    #
    34|    # 示例 / Examples:
    35|    #   "15 * * * *"     → 每小时第15分钟 / minute 15 every hour
    36|    #   "30 0-14 * * *"  → 北京时间 8:00-22:00 每小时第30分钟 / Beijing 8am-10pm
    37|    #
    38|    - cron: "33 * * * *"
    39|
    40|  workflow_dispatch:
    41|
    42|concurrency:
    43|  group: crawler-${{ github.ref_name }}
    44|  cancel-in-progress: true
    45|
    46|permissions:
    47|  contents: read
    48|  actions: write
    49|
    50|jobs:
    51|  crawl:
    52|    runs-on: ubuntu-latest
    53|    timeout-minutes: 15
    54|
    55|    steps:
    56|      - name: Checkout repository
    57|        uses: actions/checkout@v6
    58|        with:
    59|          fetch-depth: 1
    60|          clean: true
    61|
    62|      - name: Check Expiration
    63|        env:
    64|          GH_TOKEN: ${{ github.token }}
    65|        run: |
    66|          WORKFLOW_FILE="crawler.yml"
    67|          API_URL="repos/${{ github.repository }}/actions/workflows/$WORKFLOW_FILE/runs"
    68|
    69|          TOTAL=$(gh api "$API_URL" --jq '.total_count')
    70|          if [ -z "$TOTAL" ] || [ "$TOTAL" -eq 0 ]; then
    71|            echo "No previous runs found, skipping expiration check"
    72|            exit 0
    73|          fi
    74|
    75|          LAST_PAGE=$(( (TOTAL + 99) / 100 ))
    76|          FIRST_RUN_DATE=$(gh api "$API_URL?per_page=100&page=$LAST_PAGE" --jq '.workflow_runs[-1].created_at')
    77|
    78|          if [ -n "$FIRST_RUN_DATE" ]; then
    79|            CURRENT_TIMESTAMP=$(date +%s)
    80|            FIRST_RUN_TIMESTAMP=$(date -d "$FIRST_RUN_DATE" +%s)
    81|            DIFF_SECONDS=$((CURRENT_TIMESTAMP - FIRST_RUN_TIMESTAMP))
    82|            LIMIT_SECONDS=604800
    83|
    84|            if [ $DIFF_SECONDS -gt $LIMIT_SECONDS ]; then
    85|              echo "⚠️ 试用期已结束，请运行 'Check In' 签到续期"
    86|              echo "⚠️ Trial expired. Run 'Check In' to renew."
    87|              gh workflow disable "$WORKFLOW_FILE"
    88|              exit 1
    89|            else
    90|              DAYS_LEFT=$(( (LIMIT_SECONDS - DIFF_SECONDS) / 86400 ))
    91|              echo "✅ 试用期剩余 ${DAYS_LEFT} 天，到期前请运行 'Check In' 签到续期"
    92|              echo "✅ Trial: ${DAYS_LEFT} days left. Run 'Check In' before expiry to renew."
    93|            fi
    94|          fi
    95|
