name: Sogou WeChat Search

on:
  schedule:
    - cron: "23 */3 * * *"       # 每 3 小时运行一次

  workflow_dispatch:

concurrency:
  group: sogou-wechat-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          clean: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run Sogou WeChat crawler
        env:
          BARK_URL: ${{ secrets.BARK_URL }}
        run: python3 scripts/sogou_wechat_crawler.py
